<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>IELTS Reading Test</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="css/style.css">

</head>
<body>


<header>

<div class="logo">

IELTS Reading Test

</div>


<div id="timer"
class="timer-box">

60:00

</div>

</header>



<div class="main-container">


<!-- LEFT -->

<div class="passage-section">

<h2 id="passageTitle">

Reading Passage

</h2>

<div id="passageContent"
class="passage-content">

Loading...

</div>

</div>


<!-- RIGHT -->

<div class="question-section">
<div class="question-palette" id="questionPalette">
    
    </div>

    <h2>
        Questions
    </h2>

<div id="questionContainer">

</div>
<div class="navigation-buttons">
        <button id="prevBtn">
            Previous
        </button>
        <button id="nextBtn">
            Next
        </button>
    </div>
<button
id="submitBtn"
class="submit-btn">

Submit Test

</button>

</div>


</div>



<div id="resultModal"
class="hidden">

<div class="modal-content">

<h1>

Result

</h1>

<h2 id="scoreText">

</h2>

<h2 id="bandText">

</h2>

<button
onclick="closeModal()">

Close

</button>

</div>

</div>



<script src="js/payload.js"></script>

<script src="js/renderer.js"></script>

<script src="js/timer.js"></script>

<script src="js/scorer.js"></script>

<script src="js/bandScore.js"></script>

<script src="js/app.js"></script>

</body>
</html>
