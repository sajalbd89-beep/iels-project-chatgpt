<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>IELTS Creator Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>
<body>

<div class="admin-container">

    <!-- Sidebar -->

    <div class="sidebar">

        <h2>IELTS Creator</h2>

        <button>Passage</button>
        <button>Questions</button>
        <button>Generate Link</button>

    </div>


    <!-- Main -->

    <div class="admin-main">

        <h1>Create Reading Test</h1>

        <div class="card">

            <label>Passage Title</label>

            <input
            id="passageTitle"
            type="text">

        </div>


        <div class="card">

            <label>Passage Content</label>

            <textarea
            id="passageContent"></textarea>

        </div>


        <div class="card">

            <label>Question Type</label>

            <select id="questionType">

                <option>Multiple Choice</option>

                <option>True False Not Given</option>

                <option>Yes No Not Given</option>

                <option>Sentence Completion</option>

                <option>Summary Completion</option>

                <option>Matching Headings</option>

                <option>Matching Information</option>

                <option>Matching Features</option>

                <option>Matching Sentence Endings</option>

                <option>Short Answer Questions</option>

                <option>Table Completion</option>

                <option>Flow Chart Completion</option>

                <option>Diagram Label Completion</option>

                <option>Map Label Completion</option>

                <option>Plan Label Completion</option>

            </select>

        </div>


        <div id="questionBuilder">

        </div>


        <button id="addQuestion">

            Add Question
        </button>
<button id="generateLink">
Generate Exam Link
</button>
<br><br>

<textarea
id="generatedLink"
readonly
placeholder="Generated exam link will appear here">
</textarea>
    </div>

</div>

<script src="js/admin.js"></script>

</body>
</html>
